<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora GPON/EDFA Profesional</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 650px; margin: 10px auto; padding: 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; font-size: 1.4em; }
        
        .tabla-referencia { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.75em; }
        .tabla-referencia th { background: #1a73e8; color: white; padding: 6px; }
        .tabla-referencia td { border: 1px solid #ddd; padding: 6px; text-align: center; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 0.75em; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .result { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
        .ok { background: #e6f4ea; color: #1e8e3e; border: 1px solid #34a853; }
        .warn { background: #fef7e0; color: #f9ab00; border: 1px solid #fabb05; }
        .error { background: #fce8e6; color: #d93025; border: 1px solid #ea4335; }

        /* Contenedor para que el gráfico no se corte */
        .canvas-wrapper { width: 100%; overflow-x: auto; margin-top: 20px; background: white; border-radius: 8px; border: 1px solid #ddd; }
        canvas { display: block; margin: 0 auto; min-width: 400px; height: 250px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora Óptica Responsiva</h2>

    <table class="tabla-referencia">
        <tr><th>Elemento</th><th>Pérdida</th><th>Elemento</th><th>Pérdida</th></tr>
        <tr><td>Fibra 1490</td><td>0.35/km</td><td>Splitter 1:8</td><td>10.5 dB</td></tr>
        <tr><td>Fibra 1550</td><td>0.22/km</td><td>Splitter 1:16</td><td>13.8 dB</td></tr>
    </table>

    <div class="grid">
        <div>
            <label>Tecnología:</label>
            <select id="lambda" onchange="cambioFuente()">
                <option value="0.35" data-p="3">GPON (1490nm)</option>
                <option value="0.22" data-p="17">CATV (1550nm) +17</option>
                <option value="0.22" data-p="23">EDFA (1550nm) +23</option>
            </select>
        </div>
        <div><label>Potencia (dBm):</label><input type="number" id="potencia" value="3" step="0.5"></div>
    </div>

    <div class="grid">
        <div><label>Distancia (km):</label><input type="number" id="distancia" value="5" step="0.1"></div>
        <div>
            <label>Splitter 1:</label>
            <select id="s1">
                <option value="3.5" data-n="2">1:2</option>
                <option value="7.2" data-n="4">1:4</option>
                <option value="10.5" selected data-n="8">1:8</option>
                <option value="13.8" data-n="16">1:16</option>
            </select>
        </div>
    </div>

    <button onclick="calcular()">CALCULAR Y VER GRÁFICO</button>

    <div id="resultado" class="result">
        POTENCIA RECIBIDA: <span id="val">--</span> dBm
        <div id="msg" style="font-size: 0.8em; margin-top:5px;"></div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="500" height="250"></canvas>
    </div>
</div>

<script>
    function cambioFuente() {
        const sel = document.getElementById('lambda');
        document.getElementById('potencia').value = sel.options[sel.selectedIndex].getAttribute('data-p');
    }

    function calcular() {
        const lam = parseFloat(document.getElementById('lambda').value);
        const pwr = parseFloat(document.getElementById('potencia').value);
        const dist = parseFloat(document.getElementById('distancia').value);
        const s1 = parseFloat(document.getElementById('s1').value);
        
        const perd_total = (dist * lam) + (6 * 0.3) + (10 * 0.1) + s1 + 10.5 + 2.0;
        const rx = pwr - perd_total;

        const resDiv = document.getElementById('resultado');
        resDiv.style.display = "block";
        document.getElementById('val').innerText = rx.toFixed(2);

        if (lam === 0.22) {
            if (rx > 2) { resDiv.className = "result warn"; document.getElementById('msg').innerText = "⚠ SATURACIÓN"; }
            else if (rx >= -8) { resDiv.className = "result ok"; document.getElementById('msg').innerText = "✓ CATV OK"; }
            else { resDiv.className = "result error"; document.getElementById('msg').innerText = "❌ SEÑAL BAJA"; }
        } else {
            if (rx >= -27 && rx <= -8) { resDiv.className = "result ok"; document.getElementById('msg').innerText = "✓ GPON OK"; }
            else { resDiv.className = "result error"; document.getElementById('msg').innerText = "❌ FUERA DE RANGO"; }
        }
        dibujar();
    }

    function dibujar() {
        const can = document.getElementById('canvas');
        const ctx = can.getContext('2d');
        const naps = parseInt(document.getElementById('s1').options[document.getElementById('s1').selectedIndex].getAttribute('data-n'));
        
        ctx.clearRect(0,0,500,250);
        
        // 1. Dibujar Fuente
        ctx.fillStyle = "#1a73e8"; ctx.fillRect(20, 110, 50, 30);
        ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.fillText("OLT", 35, 130);

        // 2. Dibujar Splitter Central
        ctx.fillStyle = "#fabb05"; ctx.beginPath(); ctx.arc(150, 125, 12, 0, 7); ctx.fill();
        ctx.strokeStyle = "#333"; ctx.stroke();
        
        // 3. Línea Troncal
        ctx.beginPath(); ctx.moveTo(70, 125); ctx.lineTo(138, 125); ctx.strokeStyle = "#666"; ctx.stroke();

        // 4. Dibujar NAPs y Líneas
        for(let i=0; i<naps; i++) {
            const yPos = 30 + (i * (190 / (naps - 1 || 1)));
            ctx.beginPath(); ctx.moveTo(162, 125); ctx.lineTo(400, yPos); ctx.strokeStyle = "#bbb"; ctx.stroke();
            
            ctx.fillStyle = "#ea4335"; ctx.fillRect(400, yPos - 8, 20, 16);
            ctx.fillStyle = "#333"; ctx.font = "9px Arial"; ctx.fillText("NAP " + (i+1), 425, yPos + 4);
        }
    }
</script>
</body>
</html>
