<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora GPON Pro - Dinámica</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 650px; margin: 10px auto; padding: 15px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 15px; }
        
        /* Tabla Técnica */
        .tabla-tec { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.8em; }
        .tabla-tec th { background: #1a73e8; color: white; padding: 8px; text-align: left; }
        .tabla-tec td { border: 1px solid #ddd; padding: 8px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { display: block; font-size: 0.75em; font-weight: bold; color: #555; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        button:hover { background: #1557b0; }
        
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; border: 2px solid; }
        .ok { background: #e6f4ea; color: #1e8e3e; border-color: #34a853; }
        .warn { background: #fef7e0; color: #f9ab00; border-color: #fabb05; }
        .error { background: #fce8e6; color: #d93025; border-color: #ea4335; }

        .canvas-container { width: 100%; overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; background: white; }
        canvas { display: block; min-width: 550px; height: 300px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora de Red Óptica</h2>

    <table class="tabla-tec">
        <thead>
            <tr><th>Elemento</th><th>Pérdida (dB)</th><th>Elemento</th><th>Pérdida (dB)</th></tr>
        </thead>
        <tbody>
            <tr><td>Fibra 1490nm</td><td>0.35 /km</td><td>Splitter 1:2</td><td>3.5</td></tr>
            <tr><td>Fibra 1550nm</td><td>0.22 /km</td><td>Splitter 1:4</td><td>7.2</td></tr>
            <tr><td>Conector (ea)</td><td>0.30</td><td>Splitter 1:8</td><td>10.5</td></tr>
            <tr><td>Empalme (ea)</td><td>0.10</td><td>Splitter 1:16</td><td>13.8</td></tr>
        </tbody>
    </table>

    <div class="grid">
        <div>
            <label>Tecnología:</label>
            <select id="lambda" onchange="actualizarFuente()">
                <option value="0.35" data-p="3">GPON (1490nm)</option>
                <option value="0.22" data-p="17">CATV (1550nm) +17dBm</option>
                <option value="0.22" data-p="23">EDFA (1550nm) +23dBm</option>
            </select>
        </div>
        <div><label>Potencia Fuente (dBm):</label><input type="number" id="pwr" value="3" step="0.5"></div>
    </div>

    <div class="grid">
        <div><label>Distancia (km):</label><input type="number" id="dist" value="5" step="0.1"></div>
        <div><label>Margen Seguridad (dB):</label><input type="number" id="mgn" value="2" step="0.5"></div>
    </div>

    <div class="grid">
        <div><label>Nº Conectores:</label><input type="number" id="nCon" value="6"></div>
        <div><label>Nº Empalmes:</label><input type="number" id="nFus" value="10"></div>
    </div>

    <div class="grid">
        <div>
            <label>Splitter Nivel 1:</label>
            <select id="s1">
                <option value="3.5" data-n="2">1:2 (2 salidas)</option>
                <option value="7.2" data-n="4">1:4 (4 salidas)</option>
                <option value="10.5" selected data-n="8">1:8 (8 salidas)</option>
                <option value="13.8" data-n="16">1:16 (16 salidas)</option>
            </select>
        </div>
        <div>
            <label>Splitter Nivel 2 (NAP):</label>
            <select id="s2">
                <option value="7.2">1:4 (4 Clientes)</option>
                <option value="10.5" selected>1:8 (8 Clientes)</option>
                <option value="13.8">1:16 (16 Clientes)</option>
            </select>
        </div>
    </div>

    <button onclick="ejecutar()">CALCULAR Y DIBUJAR</button>

    <div id="resBox" class="result">
        POTENCIA RECIBIDA: <span id="valRx">--</span> dBm
        <div id="msgStatus" style="font-size: 0.85em; margin-top:5px;"></div>
    </div>

    <div class="canvas-container">
        <canvas id="ponCanvas" width="600" height="300"></canvas>
    </div>
</div>

<script>
    function actualizarFuente() {
        const s = document.getElementById('lambda');
        document.getElementById('pwr').value = s.options[s.selectedIndex].getAttribute('data-p');
    }

    function ejecutar() {
        const lam = parseFloat(document.getElementById('lambda').value);
        const pwr = parseFloat(document.getElementById('pwr').value);
        const dist = parseFloat(document.getElementById('dist').value);
        const mgn = parseFloat(document.getElementById('mgn').value);
        const con = parseInt(document.getElementById('nCon').value) * 0.3;
        const fus = parseInt(document.getElementById('nFus').value) * 0.1;
        const s1Val = parseFloat(document.getElementById('s1').value);
        const s2Val = parseFloat(document.getElementById('s2').value);

        const perdidaTotal = (dist * lam) + con + fus + s1Val + s2Val + mgn;
        const rx = pwr - perdidaTotal;

        const resBox = document.getElementById('resBox');
        const msg = document.getElementById('msgStatus');
        resBox.style.display = "block";
        document.getElementById('valRx').innerText = rx.toFixed(2);

        // Validación de Rangos
        if (lam === 0.22) { // 1550nm
            if (rx > 2) { resBox.className = "result warn"; msg.innerText = "⚠ PELIGRO: SATURACIÓN"; }
            else if (rx >= -8) { resBox.className = "result ok"; msg.innerText = "✓ CATV ÓPTIMO"; }
            else { resBox.className = "result error"; msg.innerText = "❌ SEÑAL CATV MUY DÉBIL"; }
        } else { // 1490nm
            if (rx >= -27 && rx <= -8) { resBox.className = "result ok"; msg.innerText = "✓ DATOS GPON ÓPTIMO"; }
            else { resBox.className = "result error"; msg.innerText = "❌ FUERA DE RANGO GPON"; }
        }
        dibujarRed();
    }

    function dibujarRed() {
        const cv = document.getElementById('ponCanvas');
        const ctx = cv.getContext('2d');
        const nNaps = parseInt(document.getElementById('s1').options[document.getElementById('s1').selectedIndex].getAttribute('data-n'));
        
        ctx.clearRect(0,0,600,300);
        
        // Dibujo Fuente (OLT/EDFA)
        ctx.fillStyle = "#1a73e8"; ctx.fillRect(20, 130, 60, 40);
        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText("OLT", 38, 155);

        // Dibujo Splitter 1er Nivel
        ctx.beginPath(); ctx.arc(180, 150, 15, 0, 7); 
        ctx.fillStyle = "#fabb05"; ctx.fill(); 
        ctx.strokeStyle = "#333"; ctx.stroke();
        ctx.fillStyle = "#000"; ctx.fillText("S1", 173, 155);

        // Conexión OLT a S1
        ctx.beginPath(); ctx.moveTo(80, 150); ctx.lineTo(165, 150);
        ctx.strokeStyle = "#888"; ctx.lineWidth = 2; ctx.stroke();

        // Dibujo de NAPs (S2)
        for(let i=0; i<nNaps; i++) {
            const y = 30 + (i * (240 / (nNaps - 1 || 1)));
            
            // Líneas de distribución
            ctx.beginPath(); ctx.moveTo(195, 150); ctx.lineTo(450, y);
            ctx.strokeStyle = "#ddd"; ctx.lineWidth = 1; ctx.stroke();

            // Cajas NAP
            ctx.fillStyle = "#ea4335"; ctx.fillRect(450, y-10, 25, 20);
            ctx.fillStyle = "#333"; ctx.font = "10px Arial";
            ctx.fillText("NAP " + (i+1), 485, y+5);
        }
    }
</script>
</body>
</html>
